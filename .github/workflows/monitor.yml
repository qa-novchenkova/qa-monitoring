# Мониторинг доступности сайтов по расписанию (cron) на серверах GitHub.
name: Site Monitoring

on:
  schedule:
    # каждые 30 минут. Формат cron: минута час день месяц день_недели (время в UTC)
    - cron: "*/30 * * * *"
  workflow_dispatch:        # плюс ручной запуск кнопкой "Run workflow"

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      ENABLE_ES: "false"    # локальный Elasticsearch с сервера GitHub недоступен — отключаем отправку
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - name: Run monitor
        run: python monitor/monitor.py    # станет красным, если какой-то сайт недоступен

      - name: Upload monitor log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs
          path: logs/monitor.log