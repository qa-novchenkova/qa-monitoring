# Прогон автотестов + публикация Allure-отчёта на GitHub Pages (официальный способ).
name: Autotests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write          # права для публикации на Pages
  id-token: write

jobs:
  # Задача 1: прогнать тесты и собрать HTML-отчёт
  build:
    runs-on: ubuntu-latest
    env:
      HEADLESS: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-java@v4      # Allure CLI работает на Java
        with:
          distribution: temurin
          java-version: "17"

      - run: pip install -r requirements.txt

      - run: pytest --alluredir=allure-results
        continue-on-error: true          # отчёт соберём даже если тест упал

      - name: Install Allure CLI
        if: always()
        run: |
          curl -sL -o allure.tgz https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          sudo tar -zxf allure.tgz -C /opt/
          sudo ln -s /opt/allure-2.29.0/bin/allure /usr/local/bin/allure

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results -o allure-report --clean

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  # Задача 2: опубликовать собранный отчёт на GitHub Pages
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4